<div class="products-page">
  <div class="page-header">
    <div>
      <h1>Products</h1>
      <p>Manage all store products here.</p>
    </div>

    <button class="add-btn">+ Add Product</button>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="6" class="empty-cell">No products available yet.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
