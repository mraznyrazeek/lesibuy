<div class="forgot-page">
  <section class="forgot-card">
    <div class="icon-wrap">
      <span>🔑</span>
    </div>

    <p class="eyebrow">Secure password reset</p>
    <h1>Create a new password</h1>

    <p class="intro">
      Choose a strong password that you have not used before.
    </p>

    <div class="success-message" *ngIf="resetCompleted">
      Your password was reset successfully. You can now sign in.
    </div>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form
      *ngIf="!resetCompleted"
      [formGroup]="resetForm"
      (ngSubmit)="submit()"
    >
      <div class="form-group">
        <label for="newPassword">New password</label>

        <input
          id="newPassword"
          type="password"
          formControlName="newPassword"
          autocomplete="new-password"
          placeholder="Enter a new password"
        />

        <small
          class="validation-message"
          *ngIf="newPassword.touched && newPassword.invalid"
        >
          Password must contain at least 8 characters.
        </small>
      </div>

      <div class="form-group second-field">
        <label for="confirmPassword">Confirm password</label>

        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          autocomplete="new-password"
          placeholder="Enter the password again"
        />

        <small
          class="validation-message"
          *ngIf="
            confirmPassword.touched &&
            resetForm.hasError('passwordsDoNotMatch')
          "
        >
          Passwords do not match.
        </small>
      </div>

      <button
        type="submit"
        class="send-button"
        [disabled]="isSubmitting"
      >
        {{ isSubmitting ? 'Resetting password...' : 'Reset password' }}
      </button>
    </form>

    <button
      type="button"
      class="back-button"
      (click)="resetCompleted ? goToLogin() : requestNewLink()"
    >
      {{ resetCompleted ? 'Continue to Sign In' : 'Request a new link' }}
    </button>
  </section>
</div>
