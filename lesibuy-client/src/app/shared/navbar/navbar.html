<nav class="navbar">
  <div class="nav-left" (click)="goHome()">
    <img
      src="/images/app-icons/lesibuy-logo.png"
      alt="LesiBuy"
      class="brand-logo"
    />
  </div>

  <div class="nav-center">
    <div class="search-wrap">
      <input
        type="text"
        placeholder="Search Apple devices..."
        class="search"
        (input)="search($any($event.target).value)"
      />
    </div>
  </div>

  <div class="nav-right">
    <button type="button" class="nav-link" (click)="goHome()">Home</button>
    <button type="button" class="nav-link" (click)="goToCategory('iPhone')">iPhone</button>
    <button type="button" class="nav-link" (click)="goToCategory('iPad')">iPad</button>
    <button type="button" class="nav-link" (click)="goToCategory('MacBook')">MacBook</button>
    <button type="button" class="nav-link" (click)="goToCategory('Apple Watch')">Watch</button>
    <button type="button" class="nav-link" (click)="goToCategory('Audio')">Audio</button>
    <button type="button" class="nav-link orders-link" (click)="goToOrders()">Orders</button>

    <ng-container *ngIf="!currentUser; else loggedInBlock">
      <button type="button" class="nav-link auth-link" (click)="goToLogin()">Login</button>
      <button type="button" class="auth-register-btn" (click)="goToRegister()">Register</button>
    </ng-container>

   <ng-template #loggedInBlock>
  <div class="user-menu-wrapper" (click)="onMenuClick($event)">
    <button
      type="button"
      class="user-box user-menu-trigger"
      (click)="toggleUserMenu($event)"
    >
      <span class="user-greeting">Hi, {{ currentUser?.fullName }}</span>
      <span class="user-menu-arrow">▾</span>
    </button>

    <div class="user-dropdown" *ngIf="isUserMenuOpen">
      <button type="button" class="dropdown-item" (click)="goToProfile()">
        My Profile
      </button>

      <button type="button" class="dropdown-item" (click)="goToOrders()">
        My Orders
      </button>

      <button type="button" class="dropdown-item" (click)="goToChangePassword()">
        Change Password
      </button>

      <button type="button" class="dropdown-item logout-item" (click)="logout()">
        Logout
      </button>
    </div>
  </div>
</ng-template>

    <button type="button" class="cart-btn" (click)="goToCart()">
      <img
        src="/images/app-icons/cart.png"
        alt="Cart"
        class="cart-icon"
      />
      <span class="cart-text">Cart</span>
      <span class="cart-badge">{{ cartCount }}</span>
    </button>
  </div>
</nav>
