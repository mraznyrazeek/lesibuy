<nav class="navbar">
  <div class="nav-left" (click)="goHome()">
    <img
      src="/images/app-icons/lesibuy-logo.png"
      alt="LesiBuy"
      class="brand-logo"
    />
  </div>

  <div class="nav-center">
    <div class="search-wrap">
      <input
        type="text"
        placeholder="Search Apple devices..."
        class="search"
        (input)="search($any($event.target).value)"
      />
    </div>
  </div>

  <div class="nav-right">
    <button type="button" class="nav-link" (click)="goHome()">Home</button>
    <button type="button" class="nav-link" (click)="goToCategory('iPhone')">iPhone</button>
    <button type="button" class="nav-link" (click)="goToCategory('iPad')">iPad</button>
    <button type="button" class="nav-link" (click)="goToCategory('MacBook')">MacBook</button>
    <button type="button" class="nav-link" (click)="goToCategory('Apple Watch')">Watch</button>
    <button type="button" class="nav-link" (click)="goToCategory('Audio')">Audio</button>
    <button type="button" class="nav-link orders-link" (click)="goToOrders()">Orders</button>

    <button type="button" class="cart-btn" (click)="goToCart()">
      <img
        src="/images/app-icons/cart.png"
        alt="Cart"
        class="cart-icon"
      />
      <span class="cart-text">Cart</span>
      <span class="cart-badge">{{ cartCount }}</span>
    </button>
  </div>
</nav>
