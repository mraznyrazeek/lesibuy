<nav class="navbar">
  <div class="nav-left" (click)="goHome()">
    <h2>LESI BUY</h2>
  </div>

  <div class="nav-center">
    <div class="search-wrap">
      <input
        type="text"
        placeholder="Search Apple devices..."
        class="search"
        (input)="search($any($event.target).value)"
      />
    </div>
  </div>

  <div class="nav-right">
    <button type="button" class="nav-link" (click)="goHome()">Home</button>
    <button type="button" class="nav-link" (click)="goToCategory('iPhone')">iPhone</button>
    <button type="button" class="nav-link" (click)="goToCategory('iPad')">iPad</button>
    <button type="button" class="nav-link" (click)="goToCategory('MacBook')">MacBook</button>
    <button type="button" class="nav-link" (click)="goToCategory('Apple Watch')">Watch</button>
    <button type="button" class="nav-link" (click)="goToCategory('Audio')">Audio</button>
    <button type="button" class="nav-link orders-link" (click)="goToorders()">orders</button>

    <ng-container *ngIf="!currentUser; else loggedInBlock">
      <button type="button" class="nav-link auth-link" (click)="goToLogin()">Login</button>
      <button type="button" class="auth-register-btn" (click)="goToRegister()">Register</button>
    </ng-container>

    <ng-template #loggedInBlock>
      <div class="notification-wrapper">
        <button
          type="button"
          class="notification-btn"
          (click)="toggleNotificationMenu($event)"
          aria-label="Notifications"
        >
          <span class="bell-icon">🔔</span>
          <span class="notification-badge" *ngIf="unreadCount > 0">
            {{ unreadCount }}
          </span>
        </button>

        <div class="notification-dropdown" *ngIf="isNotificationOpen">
          <div class="notification-header">
            <span>Notifications</span>

            <button
              type="button"
              class="mark-read-btn"
              [disabled]="unreadCount === 0"
              (click)="markAllNotificationsAsRead($event)"
            >
              Mark all read
            </button>
          </div>

          <div class="notification-empty" *ngIf="notifications.length === 0">
            No notifications yet.
          </div>

          <div class="notification-list" *ngIf="notifications.length > 0">
            <button
              type="button"
              class="notification-item"
              *ngFor="let notification of notifications"
              [class.unread]="!notification.isRead"
              (click)="openNotification(notification)"
            >
              <div class="notification-icon">📦</div>

              <div class="notification-content">
                <div class="notification-title">
                  {{ notification.title }}
                </div>

                <div class="notification-message">
                  {{ notification.message }}
                </div>

                <div class="notification-time">
                  {{ notification.createdAt | date:'short' }}
                </div>
              </div>
            </button>
          </div>
        </div>
      </div>

      <div class="user-menu-wrapper">
        <button
          type="button"
          class="user-box user-menu-trigger"
          (click)="toggleUserMenu($event)"
        >
          <span class="user-greeting">Hi, {{ currentUser?.fullName }}</span>
          <span class="user-menu-arrow">▾</span>
        </button>

        <div class="user-dropdown" *ngIf="isUserMenuOpen">
          <button type="button" class="dropdown-item" (click)="goToProfile()">
            My Profile
          </button>

          <button type="button" class="dropdown-item" (click)="goToorders()">
            My orders
          </button>

          <button
            type="button"
            class="dropdown-item"
            (click)="goToChangePassword($event)"
          >
            Change Password
          </button>

          <button type="button" class="dropdown-item logout-item" (click)="logout()">
            Logout
          </button>
        </div>
      </div>
    </ng-template>

    <button type="button" class="cart-btn" (click)="goToCart()">
      <img src="/images/app-icons/cart.png" alt="Cart" class="cart-icon" />
      <span class="cart-text">Cart</span>
      <span class="cart-badge">{{ cartCount }}</span>
    </button>
  </div>
</nav>
